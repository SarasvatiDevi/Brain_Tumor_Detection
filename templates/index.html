<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🧠 Brain Tumor Detection AI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.2rem;
}

.medical-card {
    max-width: 880px;
    width: 100%;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 2rem;
    box-shadow: 0 25px 45px rgba(0,0,0,0.25);
    overflow: hidden;
}

.scan-header {
    background: linear-gradient(110deg, #0a2f44, #0c4a6e);
    padding: 1.8rem;
    color: white;
    text-align: center;
}

.scan-header h1 {
    font-size: 1.8rem;
}

.badge-ai {
    background: #facc15;
    color: #0a2f44;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
}

.content-panel {
    padding: 2rem;
}

.upload-zone {
    background: #f8fafd;
    border: 2px dashed #a0c2da;
    border-radius: 25px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    margin-bottom: 1.5rem;
}

.upload-zone:hover {
    background: #eef6ff;
}

#imageFileInput {
    display: none;
}

.preview-section {
    border: 1px solid #e6edf4;
    border-radius: 20px;
    padding: 1rem;
    text-align: center;
    margin-bottom: 1.5rem;
}

.preview-image {
    max-width: 100%;
    max-height: 260px;
    border-radius: 15px;
}

button {
    width: 100%;
    padding: 1rem;
    border: none;
    background: #116b8f;
    color: white;
    font-size: 1rem;
    border-radius: 50px;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.result-container {
    margin-top: 1.5rem;
    background: #eef4fa;
    padding: 1.2rem;
    border-radius: 20px;
}

.result-message {
    font-size: 1.3rem;
    font-weight: bold;
}

.confidence-tag {
    margin-top: 10px;
    display: inline-block;
    background: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
}

.disclaimer-note {
    margin-top: 10px;
    font-size: 0.75rem;
    color: #666;
}
</style>
</head>

<body>

<div class="medical-card">

    <div class="scan-header">
        <h1>🧠 Brain Tumor Detection System <span class="badge-ai">AI</span></h1>
        <p>Upload MRI for tumor detection</p>
    </div>

    <div class="content-panel">

        <div class="upload-zone" id="uploadZone">
            📤 Upload Brain Scan
            <input type="file" id="imageFileInput" accept="image/*">
        </div>

        <div class="preview-section" id="previewBox">
            No image selected
        </div>

        <button id="detectButton" disabled>Analyze Scan</button>

        <div class="result-container" id="resultBox">
            Waiting for image...
        </div>

    </div>
</div>

<script>
const fileInput = document.getElementById("imageFileInput");
const uploadZone = document.getElementById("uploadZone");
const previewBox = document.getElementById("previewBox");
const detectBtn = document.getElementById("detectButton");
const resultBox = document.getElementById("resultBox");

let currentFile = null;

// Upload click
uploadZone.onclick = () => fileInput.click();

// Show preview
fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    currentFile = file;

    const url = URL.createObjectURL(file);
    previewBox.innerHTML = `<img src="${url}" class="preview-image">`;

    detectBtn.disabled = false;

    resultBox.innerHTML = "Ready for analysis...";
};

// 🔥 REAL FLASK CONNECTION
detectBtn.onclick = () => {

    if (!currentFile) return;

    resultBox.innerHTML = "Analyzing... ⏳";

    const formData = new FormData();
    formData.append("file", currentFile);

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let color = (data.result === "No Tumor") ? "green" : "red";

        resultBox.innerHTML = `
            <div class="result-message" style="color:${color}">
                🧠 ${data.result}
            </div>

            <div class="confidence-tag">
                Confidence: ${data.confidence}%
            </div>

            <div class="disclaimer-note">
                AI Prediction using trained .h5 model
            </div>
        `;
    })
    .catch(err => {
        console.log(err);
        resultBox.innerHTML = "Error connecting to backend ❌";
    });
};
</script>

</body>
</html>
